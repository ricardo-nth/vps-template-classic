metadata:
  title: Our Home Care Model - Harbor Home Care
  description: Learn how Harbor Home Care organises domiciliary delivery with strong continuity, safeguarding controls, and practical communication.
  schema:
    '@context': https://schema.org
    '@type': WebPage
    name: Our Home Care Model
    description: Learn how Harbor Home Care organises domiciliary delivery with strong continuity, safeguarding controls, and practical communication.
hero:
  heading: Home Care Delivery Built for Reliability
  subheading: Practical systems and continuity-focused teams that keep support dependable in clients' homes.
  profileContent:
    supported-living:
      heading: Supported Living Environments
      subheading: Structured homes that support tenancy sustainment and day-to-day independence.
    dom-care:
      heading: Home Care Service Environment
      subheading: Operationally strong teams supporting adults in their own homes across the community.
overview:
  heading: Operational Foundations for Safe Home Care
  description: Our model balances compassionate delivery with disciplined workflows for scheduling, medication, communication, and escalation.
  features:
    - Continuity-led rostering
    - Structured medication support records
    - Family communication standards
    - Escalation and safeguarding pathways
  imageKey: service-general
  imageAlt: Domiciliary support worker reviewing care notes
spacesSection:
  heading: Where and How We Deliver Support
  intro: Services are coordinated from our local office and delivered in homes across the boroughs we cover.
  spaces:
    - name: Home Visit Planning Hub
      description: Coordination desk for scheduling, continuity checks, and response planning.
      imageKey: featured-section
      imageAlt: Care coordination office team
    - name: Medication and Compliance Oversight
      description: Quality checks and supervision cycles that maintain safe delivery standards.
      imageKey: facility-tour
      imageAlt: Quality assurance review meeting
    - name: Family Communication Pathways
      description: Clear updates and follow-up channels for relatives and professionals.
      imageKey: service-general
      imageAlt: Family communication and care review session
locationSection:
  heading: Local Coverage and Response
  description: We support adults across London boroughs with practical routes for urgent updates and planned reviews.
  points:
    - title: Rapid Local Coordination
      description: Nearby operations support timely schedule updates and escalations.
    - title: Professional Integration
      description: Routine communication with community teams and referrers.
  ctaText: Speak to Home Care Team
  ctaHref: /contact
outcomesSnapshot:
  heading: Home Care Service Outcomes
  intro: Key metrics demonstrating the quality and reliability of our domiciliary services.
  stats:
    - value: "96%"
      label: "Visit Reliability"
      detail: "Scheduled visits completed on time, every time."
    - value: "24/7"
      label: "On-Call Support"
      detail: "Round-the-clock coordination and emergency response."
    - value: "100%"
      label: "Compliance Rating"
      detail: "Full adherence to CQC standards and local authority requirements."

serviceFit:
  badgeLabel: "Service Fit"
  heading: "Who Our Home Care Suits Best"
  intro: "Our domiciliary service is designed for adults who need reliable support to maintain independence at home."
  suitableForTitle: "Ideal For"
  suitableFor:
    - "Adults needing regular support visits in their own homes."
    - "Individuals transitioning from hospital or residential care back home."
    - "Families seeking consistent, reliable care for their loved ones."
  alternativeSupportTitle: "May Not Be Suitable When"
  alternativeSupport:
    - "24-hour residential care or nursing is required."
    - "The home environment is unsuitable or unsafe for visits."
    - "Intensive clinical interventions are the primary need."

firstThirtyDays:
  heading: "Your First 30 Days of Home Care"
  intro: "A structured onboarding process to ensure safe, consistent support from day one."
  milestones:
    - dayRange: "Days 1-7"
      title: "Assessment and Planning"
      description: "Comprehensive needs assessment, risk evaluation, and personalised care plan development."
      icon: "tabler:clipboard-check"
    - dayRange: "Days 8-14"
      title: "Team Matching"
      description: "Careful selection of support workers based on skills, personality, and consistency."
      icon: "tabler:users-group"
    - dayRange: "Days 15-30"
      title: "Review and Refinement"
      description: "First formal review, feedback gathering, and adjustments to optimise support."
      icon: "tabler:chart-line"

approach:
  heading: "Our Home Care Delivery Approach"
  description: "A reliable, person-centred model focused on consistency and quality."
  points:
    - "Thorough assessment covering needs, risks, preferences, and goals"
    - "Careful team matching for compatibility and continuity"
    - "Structured visits with clear documentation and communication"
    - "Regular reviews and responsive adjustments as needs change"

whyChooseUs:
  heading: "Why Choose Our Home Care Service"
  intro: "We combine operational excellence with genuinely caring, person-centred support."
  points:
    - title: "Consistent Teams"
      description: "The same familiar faces providing care, building trust and understanding."
    - title: "Reliable Scheduling"
      description: "Robust systems ensuring visits happen when promised, with backup plans ready."
    - title: "Clear Communication"
      description: "Regular updates to families and professionals, with responsive query handling."
  imageKey: "service-general"
  imageAlt: "Domiciliary care worker providing support at home"

faqSection:
  heading: "Home Care FAQs"
  intro: "Common questions about our domiciliary care services."
  items:
    - question: "How quickly can home care start?"
      answer: "Following assessment, we can typically begin support within 48-72 hours, with urgent cases prioritised."
    - question: "Will I have the same carer each visit?"
      answer: "We prioritise consistency, aiming to provide the same small team of familiar support workers."
    - question: "What happens if my regular carer is unavailable?"
      answer: "We have backup staff who are fully briefed on your needs, ensuring no gaps in support."
    - question: "Can care times be changed if my needs change?"
      answer: "Absolutely. We regularly review schedules and can adjust visit times and duration as required."

