metadata:
  title: Our Home - Harbor Care Services
  description: Explore Harbor Care's supported living environments designed for safety, routine stability, and independence outcomes.
  schema:
    '@context': https://schema.org
    '@type': WebPage
    name: Our Home
    description: Explore Harbor Care's supported living environments designed for safety, routine stability, and independence outcomes.
hero:
  heading: A Home Environment Built for Progress
  subheading: Safe, calm, community-connected living spaces where adults can build confidence and independence.
  profileContent:
    supported-living:
      heading: Supported Living Environments
      subheading: Structured homes that support tenancy sustainment and day-to-day independence.
    dom-care:
      heading: Home Care Service Environment
      subheading: Operationally strong teams supporting adults in their own homes across the community.
overview:
  heading: Designed Around Safety and Daily Routine
  description: Our environments combine practical accessibility, staff visibility, and person-centred planning so support remains consistent and respectful.
  features:
    - 24/7 on-call leadership support
    - Structured medication and risk workflows
    - Calm shared spaces for social routines
    - Community access planning
  imageKey: service-general
  imageAlt: Harbor care environment with support worker and resident
spacesSection:
  heading: Spaces That Support Everyday Life
  intro: Each area is designed to make routines easier, safer, and more predictable.
  spaces:
    - name: Shared Living Areas
      description: Comfortable communal spaces for social activities, reviews, and family visits.
      imageKey: featured-section
      imageAlt: Shared living area in supported living setting
    - name: Quiet Reflection Spaces
      description: Low-stimulation rooms for emotional regulation and one-to-one support.
      imageKey: facility-tour
      imageAlt: Quiet room for wellbeing support
    - name: Skills Practice Zones
      description: Practical kitchen and household spaces for life-skills coaching.
      imageKey: service-general
      imageAlt: Practical life-skills training area
locationSection:
  heading: Community-Connected Location
  description: Our locations are selected to support appointments, local participation, and family access.
  points:
    - title: Local Access
      description: Close to public transport, GP services, and community facilities.
    - title: Professional Collaboration
      description: Easy coordination with local authority, NHS, and partner teams.
  ctaText: Arrange a Visit
  ctaHref: /contact
outcomesSnapshot:
  heading: Our Home Environment Outcomes
  intro: Key benefits of our purpose-designed living spaces.
  stats:
    - value: "95%"
      label: "Resident Satisfaction"
      detail: "Service users reporting comfort and safety in our environments."
    - value: "24/7"
      label: "On-Call Support"
      detail: "Round-the-clock leadership and emergency response."
    - value: "100%"
      label: "Inspection Compliance"
      detail: "All locations meeting or exceeding regulatory standards."

serviceFit:
  badgeLabel: "Environment Fit"
  heading: "Who Our Homes Are Designed For"
  intro: "Our living environments are purpose-built for adults who need structured, safe, and community-connected accommodation."
  suitableForTitle: "Ideal For"
  suitableFor:
    - "Adults requiring supported living with 24-hour staff availability."
    - "Individuals transitioning from residential care or hospital settings."
    - "Those who benefit from communal living with structured routines."
  alternativeSupportTitle: "May Not Be Suitable When"
  alternativeSupport:
    - "Complete independent living without any support is the goal."
    - "Intensive clinical or nursing care is the primary need."
    - "The service user strongly prefers solitary living arrangements."

firstThirtyDays:
  heading: "Your First 30 Days in Our Home"
  intro: "A structured settling-in period to build familiarity and comfort."
  milestones:
    - dayRange: "Days 1-7"
      title: "Welcome and Orientation"
      description: "Tour the home, meet staff and residents, and settle into your personalised space."
      icon: "tabler:home"
    - dayRange: "Days 8-14"
      title: "Routine Building"
      description: "Establish daily patterns, join communal activities, and build relationships."
      icon: "tabler:calendar"
    - dayRange: "Days 15-30"
      title: "Goal Setting"
      description: "Review initial experience, set independence goals, and plan community engagement."
      icon: "tabler:target"

approach:
  heading: "Our Home Environment Philosophy"
  description: "Creating spaces that balance safety, independence, and community connection."
  points:
    - "Person-centred design with input from residents and families"
    - "Clear structure and routines that provide security and predictability"
    - "Gradual independence building with appropriate risk-taking encouraged"
    - "Community integration with local amenities, transport, and activities"

whyChooseUs:
  heading: "Why Choose Our Living Environment"
  intro: "Our homes combine practical design with warm, person-centred support."
  points:
    - title: "Purpose-Designed Spaces"
      description: "Every area designed with accessibility, safety, and comfort in mind."
    - title: "Community Atmosphere"
      description: "Supportive relationships between residents, staff, and families."
    - title: "Local Connectivity"
      description: "Homes situated near amenities, transport links, and community resources."
  imageKey: "service-general"
  imageAlt: "Comfortable, modern care home living space"

faqSection:
  heading: "Our Home FAQs"
  intro: "Common questions about living in our supported environments."
  items:
    - question: "Can I personalise my room?"
      answer: "Absolutely. We encourage residents to make their rooms their own with personal belongings, decorations, and furniture where possible."
    - question: "Are visitors allowed?"
      answer: "Yes, family and friends are welcome to visit. We also have comfortable visitor areas for private time together."
    - question: "Can I come and go as I please?"
      answer: "We support independence and community access, with risk assessments ensuring everyone stays safe while maintaining freedom."
    - question: "What activities are available?"
      answer: "A range of in-house and community activities including arts, cooking, exercise, and local outings based on resident interests."

