benefitsHeading: Why Work With Harbor Care
benefits:
  - title: Specialist Training and Development
    description: Structured onboarding, role-based training, and regular supervision support your progression.
  - title: Outcome-Focused Practice
    description: Work in a team that values measurable progress and person-centred delivery.
  - title: Supportive Leadership
    description: Clear communication, accessible managers, and practical support in day-to-day delivery.
