metadata:
  title: Supported Living Services - Harbor Care Services
  description: Outcome-led supported living services that help adults sustain tenancies, build life skills, and increase independence safely.
  schema:
    "@context": https://schema.org
    "@type": Service
    name: Supported Living Services
    description: Outcome-led supported living with person-centred planning, positive risk management, and structured progress reviews.
hero:
  heading: "Supported Living Services"
  subheading: "Structured tenancy support that helps adults grow confidence, maintain stability, and progress toward greater independence."
  profileContent:
    supported-living:
      heading: "Supported Living Services <br/><span class='text-secondary'>Structured Progress</span>"
      subheading: "Structured tenancy support that helps adults grow confidence, maintain stability, and progress toward greater independence."
    dom-care:
      heading: "Domiciliary Care <br/><span class='text-secondary'>Home-Based Support</span>"
      subheading: "Reliable home visits that support daily routines, wellbeing, and safer independent living in familiar surroundings."
outcomesSnapshot:
  heading: "Supported Living Outcomes Snapshot"
  intro: "Operational metrics that support referral confidence and placement planning."
  stats:
    - value: "92%"
      label: "Tenancy Sustainment"
      detail: "Placements remaining stable after 12 months."
    - value: "96%"
      label: "Family and Commissioner Satisfaction"
      detail: "Positive confidence in communication and support quality."
    - value: "100%"
      label: "Mandatory Training Compliance"
      detail: "Frontline teams current with required competencies."
serviceFit:
  badgeLabel: "Service Fit"
  heading: "Who This Supported Living Service Is Best For"
  intro: "This pathway is strongest where tenancy stability, life-skills progression, and measurable outcomes are core requirements."
  suitableForTitle: "Usually a Strong Fit For"
  suitableFor:
    - "Adults with complex needs moving into or sustaining community tenancies."
    - "Referrals requiring clear review cycles and outcome evidence."
    - "Families and professionals prioritising stable staffing and routine consistency."
  alternativeSupportTitle: "Better Directed Elsewhere When"
  alternativeSupport:
    - "Primary needs are short-term acute clinical intervention only."
    - "There is no tenancy progression or structured goal requirement."
    - "Low-intensity ad hoc visits are sufficient without ongoing review governance."
firstThirtyDays:
  heading: "What the First 30 Days Looks Like"
  intro: "Mobilisation prioritises safe onboarding, consistency of delivery, and early outcome visibility."
  milestones:
    - dayRange: "Days 1-7"
      title: "Referral Confirmation and Risk Baseline"
      description: "Confirm scope, immediate safeguards, and stakeholder communication lines."
      icon: "tabler:clipboard-check"
    - dayRange: "Days 8-14"
      title: "Plan Activation and Team Matching"
      description: "Launch co-produced routines with continuity-focused staffing and support structure."
      icon: "tabler:users-group"
    - dayRange: "Days 15-30"
      title: "Outcome Review and Adjustment"
      description: "Review early progress, remove friction points, and set month-two priorities."
      icon: "tabler:chart-line"
overview:
  heading: "Our Approach"
  description: "Our supported living model combines tenancy support, life-skills coaching, and structured review cycles."
  features:
    - "Tenancy and Daily Living Support"
    - "Life Skills Development"
    - "Community Access and Confidence"
    - "Complex Needs Support"
approach:
  heading: "Our Delivery Process"
  description: "A practical end-to-end framework from referral triage through long-term outcome review."
  points:
    - "Referral and Assessment with service users, families, and professionals"
    - "Outcome Plan Design with clear actions, review points, and safeguarding controls"
    - "Team Matching and Launch for compatibility, continuity, and safe service start"
    - "Review and Adapt to track progress and refine support as needs evolve"
whyChooseUs:
  heading: "Why Families and Professionals Choose Us"
  intro: "Our delivery combines person-centred support with governance discipline and continuity of teams."
  points:
    - title: "Structured Outcome Plans"
      description: "Support goals are clear, measurable, and reviewed regularly with stakeholders."
    - title: "Consistent Teams"
      description: "Continuity of staff improves trust, communication, and routine quality."
    - title: "Inspection-Ready Governance"
      description: "Safeguarding, supervision, and audit workflows are embedded in day-to-day delivery."
  imageKey: "residential-care"
  imageAlt: "Support worker and service user reviewing a care plan"
faqSection:
  heading: "Supported Living Referral FAQs"
  intro: "Practical answers for families, social workers, and referral leads."
  items:
    - question: "How quickly can supported living packages begin?"
      answer: "Timelines depend on complexity and risk, but urgent referrals are prioritised with clear mobilisation milestones."
    - question: "How are outcomes reported to commissioners and families?"
      answer: "We run structured reviews with documented progress against agreed goals and transparent action tracking."
    - question: "Can support levels change after onboarding?"
      answer: "Yes. Packages are designed to adapt as risks, needs, and independence goals evolve."
    - question: "Do you support transitions from residential settings?"
      answer: "Yes, including tenancy-readiness planning, routine setup, and coordinated professional/family liaison."
relatedServices:
  eyebrow: "Related services"
  heading: "Explore Complementary Support Pathways"
  intro: "These services can be combined to strengthen transitions and long-term stability."
  ctaText: "View all services"
  ctaHref: "/services"
  services:
    - title: "Transitional Care"
      description: "Short-term step-down support following discharge or placement change."
