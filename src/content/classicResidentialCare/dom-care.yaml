metadata:
  title: Domiciliary Care Services - Harbor Home Care
  description: Responsive domiciliary care services with reliable home visits, continuity of carers, and regular outcome reviews.
  schema:
    "@context": https://schema.org
    "@type": Service
    name: Domiciliary Care Services
    description: Responsive domiciliary care with reliable home visits, practical support, and review-led quality assurance.
hero:
  heading: "Domiciliary Care Services"
  subheading: "Reliable home support that keeps routines stable, wellbeing protected, and families informed."
  profileContent:
    supported-living:
      heading: "Supported Living Services <br/><span class='text-secondary'>Tenancy-Based Support</span>"
      subheading: "Structured tenancy support that helps adults grow confidence, maintain stability, and progress toward greater independence."
    dom-care:
      heading: "Domiciliary Care <br/><span class='text-secondary'>Home-Based Support</span>"
      subheading: "Reliable home support that keeps routines stable, wellbeing protected, and families informed."
outcomesSnapshot:
  heading: "Domiciliary Care Outcomes Snapshot"
  intro: "Performance indicators focused on reliability, continuity, and home-based safety."
  stats:
    - value: "97%"
      label: "On-Time Visit Performance"
      detail: "Visits delivered within planned scheduling windows."
    - value: "95%"
      label: "Primary Carer Continuity"
      detail: "Service users supported by familiar carers across routine visits."
    - value: "96%"
      label: "Family Satisfaction"
      detail: "Positive confidence in communication and care consistency."
serviceFit:
  badgeLabel: "Service Fit"
  heading: "Who This Domiciliary Service Is Best For"
  intro: "This pathway is ideal for adults who need dependable support at home with clear routines and responsive communication."
  suitableForTitle: "Usually a Strong Fit For"
  suitableFor:
    - "Adults requiring personal care, medication prompts, or mobility support at home."
    - "Families needing reliable scheduling and practical communication updates."
    - "Post-discharge pathways requiring structured routine rebuilding."
  alternativeSupportTitle: "Better Directed Elsewhere When"
  alternativeSupport:
    - "Residential or inpatient settings are clinically required as primary care environment."
    - "There is no ongoing home-visit support requirement after immediate needs."
    - "Tenancy-based supported living is the required primary model."
firstThirtyDays:
  heading: "What the First 30 Days Looks Like"
  intro: "Implementation focuses on safety, consistency, and early quality confirmation."
  milestones:
    - dayRange: "Days 1-7"
      title: "Home Assessment and Safety Setup"
      description: "Confirm routine needs, medication workflows, and escalation protocols."
      icon: "tabler:home-check"
    - dayRange: "Days 8-14"
      title: "Carer Matching and Schedule Stabilisation"
      description: "Align visit windows with continuity-focused staffing and communication routines."
      icon: "tabler:calendar-check"
    - dayRange: "Days 15-30"
      title: "Review and Service Optimisation"
      description: "Evaluate delivery quality and refine support priorities for month two."
      icon: "tabler:chart-bar"
overview:
  heading: "Home Care Overview"
  description: "Services designed around routine reliability, safeguarding confidence, and clear communication with families."
  features:
    - "Personal Care Visits"
    - "Medication Support"
    - "Meal and Nutrition Support"
    - "Wellbeing and Companionship"
approach:
  heading: "Our Delivery Process"
  description: "A practical framework that keeps home support safe, consistent, and tailored to daily life."
  points:
    - "Needs and Home Assessment with service users, relatives, and professionals"
    - "Visit Plan Setup with visit windows, care tasks, and contingencies"
    - "Carer Matching and Start for compatibility and continuity before go-live"
    - "Ongoing Review to monitor outcomes and adapt support as needs evolve"
whyChooseUs:
  heading: "Why Families Choose Our Home Care"
  intro: "Domiciliary support delivered with continuity, practical planning, and responsive communication."
  points:
    - title: "Reliable Visit Delivery"
      description: "Schedules and backup cover planning reduce missed visits and disruption."
    - title: "Continuity of Carers"
      description: "Familiar carers build trust and improve support quality over time."
    - title: "Quality and Safeguarding Controls"
      description: "Governance, supervision, and escalation processes keep care safe and accountable."
  imageKey: "residential-care"
  imageAlt: "Domiciliary care worker supporting a client at home"
faqSection:
  heading: "Domiciliary Referral FAQs"
  intro: "Practical answers for families, discharge teams, and referral coordinators."
  items:
    - question: "How fast can domiciliary care start?"
      answer: "Urgent referrals are triaged quickly with clear mobilisation steps based on complexity and risk profile."
    - question: "How do you maintain continuity of carers?"
      answer: "We use continuity-led rostering and backup planning to reduce disruption while maintaining safe coverage."
    - question: "Can visit frequency be adjusted over time?"
      answer: "Yes. Packages are reviewed regularly and adapted as routines, risks, and goals change."
    - question: "How are urgent concerns escalated?"
      answer: "Active packages include escalation pathways with responsive out-of-hours coordination where required."
