approach:
  heading: "Our Delivery Process"
  description: "A practical framework that keeps home support safe, consistent, and tailored to daily life."
  points:
    - "Needs and Home Assessment with service users, relatives, and professionals"
    - "Visit Plan Setup with visit windows, care tasks, and contingencies"
    - "Carer Matching and Start for compatibility and continuity before go-live"
    - "Ongoing Review to monitor outcomes and adapt support as needs evolve"
