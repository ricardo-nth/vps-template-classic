metadata:
  title: Contact Harbor Care Services
  description: Contact Harbor Care Services for supported living and domiciliary referrals, partnership enquiries, and care planning support.
  schema:
    "@context": https://schema.org
    "@type": ContactPage
    name: Contact Harbor Care Services
hero:
  eyebrow: "Get in Touch"
  heading: "Speak With Our Referrals Team"
  subheading: "We support families, professionals, and commissioners with clear next steps for supported living and domiciliary referrals."
  profileContent:
    supported-living:
      heading: "Speak With Our Referrals Team"
      subheading: "We support families, professionals, and commissioners with clear next steps for supported living and domiciliary referrals."
    dom-care:
      heading: "Contact Our Home Care Team"
      subheading: "Get in touch to discuss domiciliary care needs, schedule assessments, or arrange support packages."
contactInfo:
  phoneLabel: "0208 555 0199"
  phoneHref: "tel:+442085550199"
  phoneAvailability: "Monday - Friday: 8:30 AM - 6:30 PM, Saturday: 10:00 AM - 2:00 PM"
  emailLabel: "referrals@harborcare.co.uk"
  emailHref: "mailto:referrals@harborcare.co.uk"
  address: |
    Harbor Care Services
    Unit 12, Healthcare Business Park
    London, SE1 7PB
feedbackSection:
  heading: Compliments and Complaints
  intro: We log and review all feedback to improve care quality, communication, and service reliability.
  compliment:
    title: Leave a Compliment
    description: Tell us when a team member made a positive difference so we can recognise excellent practice.
    actionText: Send Compliment
    actionHref: mailto:feedback@harborcare.co.uk?subject=Compliment
  complaint:
    title: Raise a Concern
    description: If support has fallen below expectation, we will investigate promptly under our formal complaints policy.
    actionText: File Complaint
    actionHref: mailto:feedback@harborcare.co.uk?subject=Complaint
  cqcNote: You can also contact the Care Quality Commission directly if you have concerns about care quality.
  cqcLinkText: Visit CQC Website
  cqcLinkHref: https://www.cqc.org.uk/contact-us
